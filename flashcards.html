<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LVMH Voice-to-Tag — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --carbon: #1A1A1A;
    --carbon-soft: #3A3A38;
    --carbon-muted: #6A6A68;
    --bg: #F4F4F2;
    --bg-surface: #FFFFFF;
    --border: #E8E6E2;
    --text-primary: #1A1A1A;
    --text-secondary: #6A6A68;
    --positive: #16A34A;
    --warning: #D97706;
    --negative: #DC2626;
    --info: #2563EB;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--carbon);
    color: white;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .app-header-brand {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .app-header-brand h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: white;
  }
  .app-header-brand span {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .view-toggle {
    display: flex;
    gap: 8px;
  }
  .view-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
    padding: 7px 16px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .view-btn.active, .view-btn:hover {
    background: rgba(255,255,255,0.16);
    color: white;
    border-color: rgba(255,255,255,0.3);
  }

  /* ── FOCUS VIEW (mode oral) ── */
  #focusView {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }
  #focusView.hidden { display: none; }

  .focus-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .focus-card-wrap {
    width: 100%;
    max-width: 680px;
    height: 420px;
    perspective: 1200px;
    cursor: pointer;
  }

  .focus-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .focus-card-inner.flipped { transform: rotateY(180deg); }

  .focus-face {
    position: absolute;
    inset: 0;
    border-radius: 2px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
  }

  .focus-front {
    background: var(--carbon);
    color: white;
    padding: 48px 52px;
    justify-content: space-between;
  }
  .focus-front .card-phase {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .focus-front .card-number {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 300;
    color: rgba(255,255,255,0.1);
    line-height: 1;
    align-self: flex-end;
  }
  .focus-front .card-title {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 500;
    line-height: 1.1;
    color: white;
    margin-bottom: 12px;
  }
  .focus-front .card-subtitle {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }
  .focus-front .flip-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.06em;
    margin-top: auto;
    padding-top: 24px;
  }

  .focus-back {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    transform: rotateY(180deg);
    padding: 36px 48px;
    gap: 0;
    overflow-y: auto;
  }
  .focus-back .back-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .focus-back .back-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    color: var(--carbon);
  }
  .focus-back .back-phase {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .back-section {
    margin-bottom: 20px;
  }
  .back-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--carbon-muted);
    margin-bottom: 6px;
  }
  .back-section-label::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1.5px;
    background: var(--carbon);
    vertical-align: middle;
    margin-right: 8px;
  }
  .back-section p {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-primary);
  }
  .back-section .highlight {
    display: inline-block;
    background: #F0EFEC;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--carbon);
    margin: 2px 3px 2px 0;
  }
  .back-roi {
    display: inline-block;
    background: var(--carbon);
    color: white;
    border-radius: 2px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin-top: 8px;
  }

  /* ── NAV CONTROLS ── */
  .focus-nav {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .nav-btn {
    background: var(--carbon);
    color: white;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 2px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: var(--carbon-soft); }
  .nav-btn:disabled { background: var(--border); color: var(--text-secondary); cursor: default; }
  .nav-hint {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }
  .progress-bar {
    width: 280px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--carbon);
    border-radius: 1px;
    transition: width 0.3s ease;
  }

  /* ── GRID VIEW ── */
  #gridView {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    align-content: start;
  }
  #gridView.hidden { display: none; }

  .grid-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .grid-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .grid-card-top {
    background: var(--carbon);
    padding: 20px 22px 18px;
    position: relative;
  }
  .grid-card-top .g-phase {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .grid-card-top .g-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: white;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .grid-card-top .g-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    line-height: 1.4;
  }
  .grid-card-top .g-num {
    position: absolute;
    right: 18px;
    top: 16px;
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,0.08);
    line-height: 1;
  }
  .grid-card-body {
    padding: 16px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .g-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .g-row-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--carbon-muted);
    flex-shrink: 0;
    width: 56px;
    padding-top: 1px;
  }
  .g-row-val {
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-primary);
  }
  .g-tag {
    display: inline-block;
    background: #F0EFEC;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 500;
    color: var(--carbon);
    margin: 1px 2px 1px 0;
  }
  .g-open-btn {
    margin-top: 4px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 14px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    cursor: pointer;
    align-self: flex-start;
    transition: all 0.2s;
  }
  .g-open-btn:hover {
    background: var(--carbon);
    color: white;
    border-color: var(--carbon);
  }

  /* Phase color bars */
  .phase-bar {
    height: 3px;
  }
  .phase-bar.overview { background: #9A9890; }
  .phase-bar.phase1 { background: #2563EB; }
  .phase-bar.phase2 { background: #16A34A; }
  .phase-bar.cross { background: #D97706; }

  /* keyboard shortcut hint */
  .key-hint {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(26,26,26,0.85);
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 2px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    letter-spacing: 0.04em;
  }
  .key-hint kbd {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 11px;
    margin: 0 2px;
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header-brand">
    <h1>LVMH Voice-to-Tag</h1>
    <span>Flashcards — Préparation Oral</span>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnFocus" onclick="setView('focus')">Mode Oral</button>
    <button class="view-btn" id="btnGrid" onclick="setView('grid')">Vue Ensemble</button>
  </div>
</header>

<!-- ══ FOCUS VIEW ══ -->
<div id="focusView">
  <div class="focus-counter" id="focusCounter">1 / 18</div>

  <div class="focus-card-wrap" onclick="flipCard()">
    <div class="focus-card-inner" id="focusInner">
      <div class="focus-face focus-front" id="focusFront"></div>
      <div class="focus-face focus-back" id="focusBack"></div>
    </div>
  </div>

  <div class="focus-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevCard()">←</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="nav-hint">Clic pour retourner · ← → pour naviguer</div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="nextCard()">→</button>
  </div>
</div>

<!-- ══ GRID VIEW ══ -->
<div id="gridView" class="hidden" id="gridView"></div>

<div class="key-hint">
  <kbd>←</kbd><kbd>→</kbd> naviguer &nbsp;|&nbsp; <kbd>Espace</kbd> retourner &nbsp;|&nbsp; <kbd>G</kbd> grille
</div>

let currentIdx = 0;
let isFlipped = false;
let currentView = 'focus';

function setView(view) {
  currentView = view;
  document.getElementById('focusView').classList.toggle('hidden', view !== 'focus');
  document.getElementById('gridView').classList.toggle('hidden', view !== 'grid');
  document.getElementById('btnFocus').classList.toggle('active', view === 'focus');
  document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
  if (view === 'grid') renderGrid();
}

function renderCard(idx) {
  const c = CARDS[idx];
  isFlipped = false;
  document.getElementById('focusInner').classList.remove('flipped');

  // Front
  document.getElementById('focusFront').innerHTML = `
    <div class="card-phase">${c.phase}</div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;">
      <div class="card-title">${c.title}</div>
      <div class="card-subtitle">${c.subtitle}</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:24px;">
      <div class="flip-hint">Cliquer pour voir les détails</div>
      <div class="card-number">${String(idx + 1).padStart(2,'0')}</div>
    </div>
  `;

  // Back
  const tagsHtml = c.tags.map(t => `<span class="highlight">${t}</span>`).join('');
  document.getElementById('focusBack').innerHTML = `
    <div class="back-header">
      <div class="back-title">${c.title}</div>
      <div class="back-phase">${c.phase}</div>
    </div>
    <div class="back-section">
      <div class="back-section-label">Ce que c'est</div>
      <p>${c.quoi}</p>
    </div>
    <div class="back-section">
      <div class="back-section-label">Pourquoi</div>
      <p>${c.pourquoi}</p>
    </div>
    <div class="back-section">
      <div class="back-section-label">Comment ça marche</div>
      <p>${c.comment}</p>
    </div>
    <div class="back-section" style="margin-bottom:0;">
      <div class="back-section-label">Mots-clés</div>
      <div>${tagsHtml}</div>
    </div>
  `;

  document.getElementById('focusCounter').textContent = `${idx + 1} / ${CARDS.length}`;
  document.getElementById('progressFill').style.width = `${((idx + 1) / CARDS.length) * 100}%`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === CARDS.length - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('focusInner').classList.toggle('flipped', isFlipped);
}

function prevCard() {
  if (currentIdx > 0) { currentIdx--; renderCard(currentIdx); }
}

function nextCard() {
  if (currentIdx < CARDS.length - 1) { currentIdx++; renderCard(currentIdx); }
}

function renderGrid() {
  const grid = document.getElementById('gridView');
  grid.innerHTML = CARDS.map((c, i) => `
    <div class="grid-card" onclick="setView('focus');currentIdx=${i};renderCard(${i});">
      <div class="phase-bar ${c.phaseClass}"></div>
      <div class="grid-card-top">
        <div class="g-num">${String(i+1).padStart(2,'0')}</div>
        <div class="g-phase">${c.phase}</div>
        <div class="g-title">${c.title}</div>
        <div class="g-sub">${c.subtitle}</div>
      </div>
      <div class="grid-card-body">
        <div class="g-row">
          <div class="g-row-label">Quoi</div>
          <div class="g-row-val">${c.quoi.substring(0,90)}…</div>
        </div>
        <div class="g-row">
          <div class="g-row-label">Pourquoi</div>
          <div class="g-row-val">${c.pourquoi.substring(0,80)}…</div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;">
          ${c.tags.map(t => `<span class="g-tag">${t}</span>`).join('')}
        </div>
        <button class="g-open-btn">Voir en détail →</button>
      </div>
    </div>
  `).join('');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (currentView !== 'focus') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevCard(); }
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'g' || e.key === 'G') setView('grid');
});
document.addEventListener('keydown', e => {
  if (currentView === 'grid' && (e.key === 'g' || e.key === 'G' || e.key === 'Escape')) setView('focus');
});

// Init
renderCard(0);
</script>
